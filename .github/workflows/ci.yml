name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.10"
  TF_VERSION: "1.9.0"

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python linters
        run: pip install ruff

      - name: Ruff lint
        run: ruff check analyzer/ converter/ glue_jobs/ validation/ orchestration/

      - name: Ruff format check
        run: ruff format --check analyzer/ converter/ glue_jobs/ validation/ orchestration/

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform format check
        run: terraform -chdir=infrastructure fmt -check -recursive

      - name: Terraform validate
        run: |
          terraform -chdir=infrastructure init -backend=false
          terraform -chdir=infrastructure validate

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: |
          python -m pytest analyzer/tests/ converter/tests/ validation/tests/ \
            -v --tb=short --junitxml=reports/test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: reports/test-results.xml

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync Glue scripts to S3
        run: |
          aws s3 sync glue_jobs/ s3://${{ vars.SCRIPTS_BUCKET }}/jobs/ \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --delete

          cd glue_jobs/common && zip -r common_utils.zip *.py
          aws s3 cp common_utils.zip s3://${{ vars.SCRIPTS_BUCKET }}/common/

      - name: Terraform init
        run: terraform -chdir=infrastructure init

      - name: Terraform plan
        run: terraform -chdir=infrastructure plan -var-file=environments/dev.tfvars -out=tfplan

      - name: Terraform apply
        run: terraform -chdir=infrastructure apply -auto-approve tfplan

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync Glue scripts to S3
        run: |
          aws s3 sync glue_jobs/ s3://${{ vars.SCRIPTS_BUCKET }}/jobs/ \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --delete

          cd glue_jobs/common && zip -r common_utils.zip *.py
          aws s3 cp common_utils.zip s3://${{ vars.SCRIPTS_BUCKET }}/common/

      - name: Terraform init
        run: terraform -chdir=infrastructure init

      - name: Terraform plan
        run: terraform -chdir=infrastructure plan -var-file=environments/prod.tfvars -out=tfplan

      - name: Terraform apply
        run: terraform -chdir=infrastructure apply -auto-approve tfplan
