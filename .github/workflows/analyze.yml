name: SAS Analysis

on:
  workflow_dispatch:
    inputs:
      sas_source_path:
        description: "Path to SAS source files in the repo"
        required: true
        default: "sas_source/"

jobs:
  analyze:
    name: Analyze SAS Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run SAS analyzer
        run: |
          python -m analyzer.cli scan \
            --input ${{ github.event.inputs.sas_source_path }} \
            --output reports/ \
            --format all

      - name: Upload analysis reports
        uses: actions/upload-artifact@v4
        with:
          name: sas-analysis-reports
          path: reports/
          retention-days: 90

  convert:
    name: Batch Convert SAS to PySpark
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run converter
        run: |
          python -m converter.cli run \
            --input ${{ github.event.inputs.sas_source_path }} \
            --output glue_jobs/jobs/ \
            --report reports/conversion_report.csv

      - name: Upload conversion results
        uses: actions/upload-artifact@v4
        with:
          name: conversion-results
          path: |
            glue_jobs/jobs/
            reports/conversion_report.csv
          retention-days: 90
